name: Regular Update to Clock Corrections
on: 
  schedule:
    # * is a special character in YAML so you have to quote this string
    - cron:  '23 20 * * *'
  workflow_dispatch:
jobs:
  run-update-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set-Up Python Env
        uses: mamba-org/setup-micromamba@v1
        with:
          init-shell: bash
          environment-name: clocks
          cache-environment: true
          cache-downloads: true
          create-args: >-
              -c conda-forge
              python=3.11
              astropy
              git
      - name: Install Specified Requirements
        shell: bash -el {0}
        run: pip install -r requirements.txt
      - name: Clone the Directory & Switch to GH-Pages
        shell: bash -el {0}
        run: git clone https://github.com/${{ github.repository }}.git --branch gh-pages --single-branch /tmp/gh-pages --depth 1
      - name: Update the Clock Files from Remote Repositories
        shell: bash -el {0}
        run: python update_clock_corrections.py --gh-pages /tmp/gh-pages
      - name: Push Clock Corrections to Remote Repo
        shell: bash -el {0}
        run: |
          git config --global user.name "IPTA Cyber-I"
          git config --global user.email 'cyber-i@ipta4gw.org'
          git add tempo T2runtime log
          git commit -am "Routine repo update from Github action `date`"
          git log -n 1
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Push all Clock Files to the GH Page
        shell: bash -el {0}
        run: |
          cd /tmp/gh-pages
          git add .
          git commit -am "Routine gh-pages update from Github action `date`"
          git log -n 1
          git remote set-url origin \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/$GITHUB_REPOSITORY
          git push
      - name: Write notification in Slack channel
        uses: ravsamhq/notify-slack-action@v2
        if: always()
        with:
          footer: "Linked Repo <{repo_url}|{repo}> | <{run_url}|Job {job}>"
          icon_failure: ":fire:"
          icon_success: ":cake:"
          mention_groups: "!channel"
          mention_groups_when: "failure,warnings"
          message_format: |
            {emoji} *{workflow}* {status_message} in <{repo_url}|{repo}>
          notification_title: "Github Actions job completed!"
          status: ${{ job.status }}
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
